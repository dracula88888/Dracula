name: Build DiamondLightningPlugin
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Fix enchantment
        run: sed -i 's/Enchantment\.UNBREAKING/Enchantment.DURABILITY/g' src/main/java/com/altarsmp/diamondsword/DiamondLightningPlugin.java
      - name: Build
        run: mvn clean package --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: DiamondLightningPlugin
          path: target/DiamondLightningPlugin.jar
