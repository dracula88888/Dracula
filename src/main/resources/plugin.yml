name: DevilsWrath
version: 1.0.0
main: com.devilswrath.plugin.DevilsWrathPlugin
api-version: '1.21'
description: Devil's Wrath — Soulbound Diamond Sword with Blindness and Shield-Break ability
author: DevilsWrath

commands:
  devilswrath:
    description: Claim or manage the Devil's Wrath
    usage: /devilswrath [owner|restore]
    permission: devilswrath.claim

permissions:
  devilswrath.claim:
    description: Allows a player to claim the Devil's Wrath
    default: op
  devilswrath.admin:
    description: Admin restore command
    default: op
